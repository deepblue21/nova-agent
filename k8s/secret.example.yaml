# Copy to secret.yaml and fill in real values (never commit the filled version).
#   kubectl apply -f secret.yaml
# In production prefer a secrets manager (External Secrets Operator, Vault, SOPS).
apiVersion: v1
kind: Secret
metadata:
  name: nova-secrets
  namespace: nova
type: Opaque
stringData:
  GATEWAY_TOKEN: "CHANGE_ME"
  DATABASE_URL: "postgres://USER:PASS@pg-host:5432/nova"   # managed Postgres (RDS/Cloud SQL)
  REDIS_URL: "redis://redis-host:6379"                     # managed Redis (ElastiCache/Memorystore)
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENAI_API_KEY: ""
  OIDC_ISSUER: ""
  OIDC_JWKS_URL: ""
  OIDC_AUDIENCE: ""
  S3_ENDPOINT: ""          # empty = real AWS S3; set for MinIO
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  STRIPE_SECRET_KEY: ""
